<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live F1 Leaderboard & Map</title>
    <style>
        /* Basic CSS for the layout, more styling should go in a separate style.css file */
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { display: flex; gap: 20px; }
        #leaderboard { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #track-map { flex: 2; background: #333; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Live F1 Session Status</h1>
    <div class="container">
        <div id="leaderboard">
            <h2>Leaderboard</h2>
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>No</th>
                        <th>Driver</th>
                        <th>Lap</th>
                        <th>Gap</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Leaderboard rows will be injected here by JavaScript -->
                </tbody>
            </table>
        </div>
        <div id="track-map">
            <h2>Track Map Display (Conceptual)</h2>
            <p>This area would use a library like Canvas or SVG to plot driver positions using GPS data from the API.</p>
            <div id="map-area" style="width: 100%; height: 500px; background-color: #555;">
                <!-- Map visualization goes here -->
            </div>
        </div>
    </div>
    
    <!-- Link to the JavaScript file that fetches data and updates the page -->
    <script src="script.js"></script>
</body>
</html>
