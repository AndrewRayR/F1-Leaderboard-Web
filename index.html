<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live F1 Leaderboard</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e10600; /* F1 brand color */
            text-align: center;
        }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .leaderboard-table th {
            background-color: #e10600;
            color: white;
        }
        .leaderboard-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .leaderboard-table tr:hover {
            background-color: #f1f1f1;
        }
        .driver-pos {
            font-weight: bold;
            width: 50px;
        }
        .driver-name {
            font-weight: bold;
        }
        .driver-team {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>F1 Leaderboard</h1>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Driver</th>
                    <th>Team</th>
                    <th>Nationality</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Data will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        // Use the Ergast API for a simple demonstration
        const API_URL = 'http://ergast.com';

        async function fetchF1Data() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                displayLeaderboard(data);
            } catch (error) {
                console.error('Error fetching F1 data:', error);
                document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="4">Failed to load data. Please check console for errors.</td></tr>';
            }
        }

        function displayLeaderboard(data) {
            const drivers = data.MRData.DriverTable.Drivers;
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = ''; // Clear previous data

            drivers.forEach((driver, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="driver-pos">${index + 1}</td>
                    <td class="driver-name">${driver.givenName} ${driver.familyName}</td>
                    <td class="driver-team">N/A (Team data not in this specific API call)</td>
                    <td>${driver.nationality}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Fetch data when the page loads
        fetchF1Data();
    </script>

</body>
</html>
